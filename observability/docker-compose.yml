# Local observability stack for Claude Code telemetry.
#
#   Claude Code  --OTLP-->  collector  --scrape-->  prometheus  -->  grafana
#
# Bring up:  docker compose -f observability/docker-compose.yml up -d
# Then flip CLAUDE_CODE_ENABLE_TELEMETRY to "1" (see ../settings.json or the README).
services:
  collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  (point Claude Code's OTEL endpoint here)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint (collector -> prometheus)

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on: [collector]

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]
